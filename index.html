<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kitchen Control</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.kitchen{
position:relative;
width:600px;
margin:auto;
}

.kitchen img{
width:100%;
border-radius:10px;
}

.device{
position:absolute;
cursor:pointer;
}

.light{
top:120px;
left:260px;
}

.fan{
top:260px;
left:180px;
}

.socket{
top:340px;
left:420px;
}

.timer{
margin-top:20px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

</style>

</head>

<body>

<h2>Kitchen Control Panel</h2>

<div class="kitchen">

<img src="kitchen-top.png">

<img src="light.png" class="device light" width="40" onclick="lightToggle()">

<img src="fan.png" class="device fan" width="40" onclick="fanToggle()">

<img src="plug.png" class="device socket" width="40" onclick="socketToggle()">

</div>

<div class="timer">

<h3>Timer</h3>

<button onclick="timer(60)">1 min</button>
<button onclick="timer(300)">5 min</button>
<button onclick="timer(900)">15 min</button>

</div>

<p>Status: <span id="status">Connecting...</span></p>

<script>

const client = mqtt.connect(
'wss://aa9f608950fa44d2b6143e2f967b1fcf.s1.eu.hivemq.cloud:8884/mqtt',
{
username:'esp8266',
password:'relay123'
})

client.on('connect',function(){

document.getElementById("status").innerText="Connected"

client.subscribe('home/kitchen/relay1/state')

})

client.on('message',function(topic,message){

if(topic==="home/kitchen/relay1/state")
document.getElementById("status").innerText=message.toString()

})

function lightToggle(){
client.publish('home/kitchen/relay1','ON')
}

function fanToggle(){
client.publish('home/kitchen/relay2','ON')
}

function socketToggle(){
client.publish('home/kitchen/relay3','ON')
}

function timer(sec){
client.publish('home/kitchen/timer',sec.toString())
}

</script>

</body>
</html>
